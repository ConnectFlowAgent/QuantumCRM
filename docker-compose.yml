version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PG_USER=postgres
      - PG_HOST=postgres_db
      - PG_DATABASE=whatsapp_crm
      - PG_PASSWORD=postgres_password
      - PG_PORT=5432
      - REDIS_URL=redis://redis_cache:6379
    # ── Volumen de código para desarrollo (hot changes sin rebuild) ──────────
    # Los archivos del host se montan directamente en el contenedor.
    # Elimina este bloque 'volumes' en producción real.
    volumes:
      - ./app.js:/usr/src/app/app.js
      - ./routes:/usr/src/app/routes
      - ./services:/usr/src/app/services
      - ./middlewares:/usr/src/app/middlewares
      - ./config:/usr/src/app/config
      - ./public:/usr/src/app/public
      - ./update_db.js:/usr/src/app/update_db.js
      # node_modules se excluye del mount para no sobreescribir lo instalado
      - /usr/src/app/node_modules
    depends_on:
      - postgres_db
      - redis_cache
    restart: unless-stopped

  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: whatsapp_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql

  redis_cache:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
